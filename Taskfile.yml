version: '3'

vars:
  FRONTEND_DIR: frontend
  BACKEND_DIR: backend
  GOBACKEND_DIR: gobackend
  SQLC_DIR: gobackend/internal/driven/adapters/database

tasks:
  install-frontend:
    dir: '{{.FRONTEND_DIR}}'
    cmds:
      - npm install

  install-backend:
    dir: '{{.BACKEND_DIR}}'
    cmds:
      - pip install -r requirements.txt

  install-sqlc:
    dir: '{{.GOBACKEND_DIR}}'
    status:
      - command -v sqlc && sqlc version | grep -q "1.31.1"
    cmds:
      - go install github.com/sqlc-dev/sqlc/cmd/sqlc@v1.31.1

  install:
    desc: Install all dependencies
    cmds:
      - task: install-frontend
      - task: install-backend

  frontend:
    desc: Start the frontend development server
    dir: '{{.FRONTEND_DIR}}'
    cmds:
      - npm run dev

  backend:
    desc: Start the backend server
    dir: '{{.BACKEND_DIR}}'
    cmds:
      - python app.py
    
  gobackend:
    desc: Start the go backend server
    dir: '{{.GOBACKEND_DIR}}'
    cmds:
      - go run cmd/api/main.go
  
  gensqlc:
    desc: Generate sqlc code
    dir: '{{.SQLC_DIR}}'
    deps:
      - install-sqlc
    cmds:
      - PATH="$PATH:$HOME/go/bin" sqlc generate -f sqlc.yml

  clean:
    desc: Clean up node_modules and python cache
    cmds:
      - rm -rf {{.FRONTEND_DIR}}/node_modules
      - find . -type d -name "__pycache__" -exec rm -r {} +
      - find . -type f -name "*.pyc" -delete

  publish-fe:
    vars:
      FE_VERSION:
        sh: yq -r ".version" {{.FRONTEND_DIR}}/package.json | sed 's/^v//' || exit -1
    cmds:
      - git tag -a fe-v{{.FE_VERSION}} -m "Frontend version {{.FE_VERSION}}"
      - git push origin fe-v{{.FE_VERSION}}
  
  publish-api:
    vars:
      API_VERSION:
        sh: grep '^__version__' {{.BACKEND_DIR}}/app.py | sed 's/.*"\(.*\)".*/\1/' | sed 's/^v//' || exit -1
    cmds:
      - git tag -a api-v{{.API_VERSION}} -m "Backend version {{.API_VERSION}}"
      - git push origin api-v{{.API_VERSION}}
    
